name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Validate commit messages follow Conventional Commits
  # ─────────────────────────────────────────────────────────────
  commitlint:
    name: Commit Message Format
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Checking commits from $BASE to $HEAD"
          npx commitlint --from "$BASE" --to "$HEAD" --verbose
        continue-on-error: true  # warn only, don't block

  # ─────────────────────────────────────────────────────────────
  # PR Size check — warns on very large PRs
  # ─────────────────────────────────────────────────────────────
  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const additions = pr.additions;
            const deletions = pr.deletions;
            const total = additions + deletions;
            const files = pr.changed_files;

            console.log(`PR Stats: +${additions} -${deletions} (${total} total) in ${files} files`);

            let label = 'size/xs';
            let emoji = '🟢';
            if (total > 1000) { label = 'size/xl'; emoji = '🔴'; }
            else if (total > 500) { label = 'size/l'; emoji = '🟠'; }
            else if (total > 200) { label = 'size/m'; emoji = '🟡'; }
            else if (total > 50)  { label = 'size/s'; emoji = '🟢'; }

            // Post a summary comment
            const body = [
              `## ${emoji} PR Size: ${label.toUpperCase()}`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Lines added | +${additions} |`,
              `| Lines removed | -${deletions} |`,
              `| Total changes | ${total} |`,
              `| Files changed | ${files} |`,
              '',
              total > 500
                ? '⚠️ **This PR is large.** Consider breaking it into smaller, focused PRs.'
                : '✅ PR size looks good!'
            ].join('\n');

            // Find existing size comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const sizeComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('PR Size:')
            );

            if (sizeComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: sizeComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ─────────────────────────────────────────────────────────────
  # Dependency security audit (npm audit)
  # ─────────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'

      - name: Install dependencies
        run: npm install

      - name: Run npm audit (root)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run npm audit (web-dashboard)
        run: cd apps/web-dashboard && npm audit --audit-level=high
        continue-on-error: true

      - name: Python dependency audit (ai-service)
        run: |
          pip install pip-audit
          cd apps/ai-service
          pip-audit --requirement <(pip install poetry && poetry export -f requirements.txt --without-hashes 2>/dev/null || echo "") 2>/dev/null || true
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Check for secrets accidentally committed
  # ─────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # optional
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # Verify .env.example is up to date
  # ─────────────────────────────────────────────────────────────
  env-check:
    name: Env Example Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check .env files are not committed
        run: |
          COMMITTED_ENVS=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E '^\.env$|^apps/.*\.env$' | grep -v '.env.example' || true)
          if [[ -n "$COMMITTED_ENVS" ]]; then
            echo "❌ ERROR: .env files should not be committed!"
            echo "$COMMITTED_ENVS"
            exit 1
          fi
          echo "✅ No .env files committed"

      - name: Check .env.example exists
        run: |
          if [[ ! -f ".env.example" ]]; then
            echo "⚠️  WARNING: .env.example is missing at root"
          else
            echo "✅ .env.example present"
            echo "--- Variables defined ---"
            grep -E '^[A-Z_]+=' .env.example | cut -d= -f1
          fi

  # ─────────────────────────────────────────────────────────────
  # Post final PR review summary
  # ─────────────────────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [commitlint, pr-size, security-audit, secret-scan, env-check]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Write summary
        run: |
          echo "## 🔍 PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit Format | ${{ needs.commitlint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PR Size | ${{ needs.pr-size.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Env Check | ${{ needs.env-check.result }} |" >> $GITHUB_STEP_SUMMARY

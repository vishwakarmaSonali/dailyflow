name: Deploy Web Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-dashboard/**'
      - 'packages/api-client/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────
  # Verify build before deploying
  # ─────────────────────────────────────────────────────────────
  verify-build:
    name: Verify Build
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: '8'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/package.json') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install all workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run tests
        run: pnpm --filter=web-dashboard run test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test

      - name: Build for production
        run: pnpm --filter=web-dashboard run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_APP_VERSION: ${{ github.sha }}
          NODE_ENV: production

      - name: Upload build artifact
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: web-dashboard-dist-${{ github.sha }}
          path: apps/web-dashboard/dist/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Deploy to Vercel (Production)
  # ─────────────────────────────────────────────────────────────
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: verify-build
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dashboard-dist-${{ github.sha }}
          path: apps/web-dashboard/dist/

      - name: Deploy to Vercel (Production)
        id: deploy
        working-directory: apps/web-dashboard
        run: |
          DEPLOY_URL=$(vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --env VITE_API_URL=${{ secrets.VITE_API_URL }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "🚀 Deployed to: $DEPLOY_URL"

      - name: Comment deployment URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Web Dashboard deployed!**\n\nURL: ${{ steps.deploy.outputs.url }}\nCommit: \`${{ github.sha }}\``
            })

  # ─────────────────────────────────────────────────────────────
  # Smoke test deployed URL
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-vercel
    if: needs.deploy-vercel.outputs.url != ''
    steps:
      - name: Wait for deployment to settle
        run: sleep 10

      - name: Check deployment health
        run: |
          URL="${{ needs.deploy-vercel.outputs.url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Smoke test failed — expected 200, got $STATUS"
            exit 1
          fi
          echo "✅ Smoke test passed — $URL is live"

  # ─────────────────────────────────────────────────────────────
  # Notify on failure
  # ─────────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [verify-build, deploy-vercel, smoke-test]
    if: failure()
    steps:
      - name: Post failure summary
        run: |
          echo "## ❌ Web Dashboard Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| verify-build | ${{ needs.verify-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy-vercel | ${{ needs.deploy-vercel.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| smoke-test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY

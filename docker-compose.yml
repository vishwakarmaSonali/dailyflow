version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: dailyflow-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dailyflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dailyflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - dailyflow
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./apps/ai-service
    container_name: dailyflow-ai-service
    environment:
      - PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL}
      - OPENAI_WHISPER_MODEL=${OPENAI_WHISPER_MODEL}
      - REDIS_URL=${REDIS_URL}
      - AUTH_SERVICE_URL=${AUTH_SERVICE_URL:-http://localhost:3001}
      - HABIT_SERVICE_URL=${HABIT_SERVICE_URL:-http://localhost:3002}
      - EXPENSE_SERVICE_URL=${EXPENSE_SERVICE_URL:-http://localhost:3003}
      - ANALYTICS_SERVICE_URL=${ANALYTICS_SERVICE_URL:-http://localhost:3004}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - dailyflow

networks:
  dailyflow:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
